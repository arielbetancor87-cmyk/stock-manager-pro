<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Venta Directa"/>
  <meta name="theme-color" content="#e0224e"/>
  <meta name="description" content="Gestion de stock y ventas para revendedoras"/>
  <title>Venta Directa</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png"/>
</head>
<body style="margin:0">
  <div id="root"></div>
  <script type="module" src="/src/index.jsx"></script>
  <script>
    // Solo registrar Service Worker en web (no dentro del APK Capacitor)
    var esCapacitor = window.location.protocol === "capacitor:" || (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
    if ('serviceWorker' in navigator && !esCapacitor && window.location.protocol.indexOf("http") === 0) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').catch(function(){});
      });
    }
  </script>
</body>
</html>
